strategy = "trade_2"
trade_usd = 3
max_retries = 3
entry_buy_cooldown_sec = 25

[openclaw]
# OpenClaw-style AI decision layer (deterministic rules; not "risk-free arbitrage")
enabled = false
# Decision source:
# - deterministic: local explainable rules (no network)
# - http: call external OpenClaw/LLM service (falls back to deterministic on any error)
mode = "deterministic"
# Minimum required edge before acting (basis points). 50 bps = 0.50%
min_edge_bps = 50
# Safety gate: reject trading when UP/DOWN mid prices deviate too far from 1.00 (basis points)
max_spread_bps = 200
# In-memory lookback points for deterministic trend/velocity heuristics
lookback_points = 12

# Optional HTTP mode (only used when mode="http")
# [openclaw.http]
# url = "https://your-openclaw-service.example.com/decide"
# bearer_token = "set-me-if-needed"
# timeout_ms = 2500

[market]
market_coin = "btc"  # btc / eth / sol / xrp
market_period = "5" # 5 / 15 / 60 / 240 / 1440

[trade_1]
entry_price_range = [0.4, 0.6]
swap_price_range = [0.0, 0.8]
take_profit = 2.0
stop_loss = 0.5
exit_time_ratio = 0.95
exit_price_ratio = 0.98

[trade_2]
entry_price_ratio = [0.4, 0.95]
entry_time_ratio = 0.7
exit_price_ratio_range = [[0.0, 0.01], [1.0, 1.0]]
emergency_swap_price = [0.0, 0.5]
